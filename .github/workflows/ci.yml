name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run build
      - run: npx vitest run test/extractor.test.ts test/generator.test.ts test/robots.test.ts
        if: matrix.node-version != 20
      - run: npx vitest run --coverage test/extractor.test.ts test/generator.test.ts test/robots.test.ts
        if: matrix.node-version == 20
      - uses: codecov/codecov-action@v5
        if: matrix.node-version == 20
        with:
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run build
      - run: npx vitest run test/integration.test.ts
